[platformio]
src_dir = .
; Derleme ciktilari masaustu disinda: antivirus/senkron araclari .pio altindaki
; ara dosyalari silip linki bozuyordu ("No such file or directory").
build_dir = C:\Users\Gaming\.vecta_build

[env:esp32-s3-devkitc-1]
; Sabitlenmis surum: arduino-esp32 3.1.x (Bluedroid BLE). Unpinned git HEAD
; core 3.3'u getiriyor; orada BLE NimBLE'a tasindi ve esp_gap_ble_api.h yok.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    git+https://github.com/moononournation/Arduino_GFX.git
    git+https://github.com/Bodmer/TJpg_Decoder.git
    links2004/WebSockets@^2.4.1
    git+https://github.com/pschatzmann/arduino-libopus.git
    ; ---- Edge AI (TFLite Micro) -------------------------------------------
    ; Asagidaki satiri AC -> mod_edgeai gercek sinir agi modelini calistirir
    ; (edgeai_model.h dolu olmali; bkz. tools/edgeai_train.py). Kapali kaldikca
    ; cihaz prototip-eslestirmeye duser, build etkilenmez.
    ; git+https://github.com/tanakamasayuki/Arduino_TensorFlowLite_ESP32.git
